# Syncs docs to the GitHub Wiki whenever changes land on main.
#
# No secrets needed — GITHUB_TOKEN is provided automatically by Actions.
# The only requirement: enable the wiki on your repo (Settings → Features → Wikis)
# and create at least one wiki page manually first (GitHub won't auto-init the wiki repo).
#
# What gets synced:
#   knowledge-base/**  →  wiki/knowledge-base/   (permanent reference)
#   research/**        →  wiki/research/          (deep sourced notes)
#   notes/**           →  wiki/notes/             (sprint synthesis notes)
#   prds/**            →  wiki/prds/              (approved specs only)
#   roadmap.md         →  wiki/Roadmap.md
#
# A Home.md index is generated automatically on every sync.
# Truth lives in Git. Never edit wiki pages directly — changes will be overwritten.

name: Sync docs to GitHub Wiki

on:
  workflow_dispatch:  # allow manual trigger from the Actions tab
  push:
    branches: [main]
    paths:
      - "knowledge-base/**"
      - "research/**"
      - "notes/**"
      - "prds/**"
      - "roadmap.md"
      - ".github/workflows/sync-wiki.yml"  # re-sync when the workflow itself changes

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone or init wiki repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          if git clone "$WIKI_URL" wiki-repo 2>/dev/null; then
            echo "Wiki repo cloned successfully."
          else
            echo "Wiki repo does not exist yet — initialising it."
            mkdir wiki-repo
            cd wiki-repo
            git init
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            # GitHub requires at least one commit before the remote is accepted
            echo "# pm-collab Wiki" > Home.md
            git add Home.md
            git commit -m "init: create wiki"
            git remote add origin "$WIKI_URL"
            git push -u origin HEAD:master
            cd ..
            # Now clone fresh so subsequent steps work against a real remote
            rm -rf wiki-repo
            git clone "$WIKI_URL" wiki-repo
          fi

      - name: Copy docs into wiki
        run: |
          cd wiki-repo

          # Clear previous synced content, preserve .git
          find . -mindepth 1 -not -path './.git*' -delete

          # knowledge-base → permanent reference (drop internal template)
          mkdir -p knowledge-base
          cp ../knowledge-base/*.md knowledge-base/ 2>/dev/null || true
          rm -f knowledge-base/_NOTE_TEMPLATE.md

          # research → deep sourced notes
          mkdir -p research
          cp ../research/*.md research/ 2>/dev/null || true

          # notes → only publish reviewed notes (drafts stay internal)
          mkdir -p notes
          for f in ../notes/*.md; do
            [ -f "$f" ] || continue
            if grep -q "status: reviewed" "$f" 2>/dev/null; then
              cp "$f" notes/
            fi
          done

          # prds → active and approved specs (no briefs, no archive)
          mkdir -p prds
          for f in ../prds/active/*.md ../prds/approved/*.md; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            [[ "$base" == *.brief.md ]] && continue
            cp "$f" prds/
          done

          # roadmap at wiki root
          cp ../roadmap.md Roadmap.md

      - name: Generate Home.md index
        run: |
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          TIMESTAMP="${{ github.event.head_commit.timestamp }}"

          cd wiki-repo

          {
            echo "# pm-collab — IQ Product Team Docs"
            echo ""
            echo "> Read-only mirror of the [pm-collab](https://github.com/${REPO}) repo."
            echo "> **Never edit these pages directly** — changes are overwritten on every push to main."
            echo "> Last synced: ${TIMESTAMP} ([\`${SHA:0:7}\`](https://github.com/${REPO}/commit/${SHA}))"
            echo ""
            echo "---"
            echo ""
            echo "## 📌 Reference"
            echo "_Permanent context loaded into every AI session._"
            echo ""
            echo "| Doc | What it covers |"
            echo "|-----|----------------|"
            echo "| [Product Context](knowledge-base/product-context) | What IQ is, who it's for, current stage, strategic priorities |"
            echo "| [Glossary](knowledge-base/glossary) | Canonical terms and what to avoid |"
            echo "| [Voice & Style](knowledge-base/voice-and-style) | How our docs should read |"
            echo "| [Roadmap](Roadmap) | Now / Next / Later |"
            echo ""
            echo "---"
            echo ""
            echo "## 🔬 Research"
            echo "_Deep sourced notes on strategy, architecture, and economics. The RAG corpus._"
            echo ""
            for f in research/*.md; do
              [ -f "$f" ] || continue
              title=$(head -1 "$f" | sed 's/^#* *//')
              slug=$(basename "$f" .md)
              echo "- [${title}](research/${slug})"
            done
            echo ""
            echo "---"
            echo ""
            echo "## 📋 PRDs"
            echo "_Approved product specs. One file per feature._"
            echo ""
            for f in prds/*.md; do
              [ -f "$f" ] || continue
              title=$(head -1 "$f" | sed 's/^#* *//')
              slug=$(basename "$f" .md)
              echo "- [${title}](prds/${slug})"
            done
            echo ""
            echo "---"
            echo ""
            echo "## 🗒️ Sprint Notes"
            echo "_Synthesis notes generated per feature during the product sprint chain._"
            echo ""
            for f in notes/*.md; do
              [ -f "$f" ] || continue
              title=$(head -1 "$f" | sed 's/^#* *//')
              slug=$(basename "$f" .md)
              echo "- [${title}](notes/${slug})"
            done
          } > Home.md

      - name: Commit and push to wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd wiki-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to sync." && exit 0
          git commit -m "docs: sync from main @ ${{ github.sha }}"
          git push
